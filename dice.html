<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运骰子 - 青春畅饮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .game-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            margin-bottom: 40px;
        }
        .dice-container {
            perspective: 600px;
            margin-bottom: 40px;
        }
        .dice {
            width: 150px;
            height: 150px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .dice.rolling {
            animation: roll 0.6s ease-in-out;
        }
        @keyframes roll {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            25% { transform: rotateX(90deg) rotateY(90deg); }
            50% { transform: rotateX(180deg) rotateY(180deg); }
            75% { transform: rotateX(270deg) rotateY(270deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
        .result {
            margin: 30px 0;
            padding: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result.win {
            color: #27ae60;
        }
        .result.normal {
            color: #333;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #fa709a;
        }
        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: white;
            color: #fa709a;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            margin: 10px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-back {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .rules {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            text-align: left;
        }
        .rules h3 {
            color: #333;
            margin-bottom: 10px;
        }
        .rules ul {
            list-style: none;
            padding: 0;
        }
        .rules li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            color: #666;
        }
        .rules li:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎲 幸运骰子</h1>
        <p class="subtitle">花3元玩一次，掷骰子赢大奖！</p>
        
        <div class="dice-container">
            <div class="dice" id="dice">?</div>
        </div>
        
        <div class="result" id="result"></div>
        
        <button class="btn" id="roll-btn" onclick="rollDice()">掷骰子</button>
        <button class="btn btn-back" onclick="window.location.href='index.html'">返回首页</button>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="game-count">0</div>
                <div class="stat-label">游戏次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="total-revenue">¥0</div>
                <div class="stat-label">总收入</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="total-prizes">¥0</div>
                <div class="stat-label">总奖品</div>
            </div>
        </div>

        <div class="rules">
            <h3>🎯 游戏规则</h3>
            <ul>
                <li>🎲 掷出6点：一等奖 - 大窑汽水x2</li>
                <li>🎲 掷出4-5点：二等奖 - 大窑汽水x1</li>
                <li>🎲 掷出1-3点：参与奖 - 矿泉水x1</li>
                <li>💰 每次游戏费用：¥4</li>
            </ul>
        </div>
    </div>

    <script>
let totalRevenue = 0;
let totalPrizes = 0;
let gameCount = 0;
let isRolling = false;

function rollDice() {
    if (isRolling) return;
    
    isRolling = true;
    const dice = document.getElementById('dice');
    const resultDiv = document.getElementById('result');
    const rollBtn = document.getElementById('roll-btn');
    
    rollBtn.disabled = true;
    dice.classList.add('rolling');
    dice.textContent = '?';
    resultDiv.textContent = '';
    resultDiv.className = 'result';
    
    let rollCount = 0;
    const maxRolls = 15;
    
    const rollInterval = setInterval(() => {
        dice.textContent = Math.floor(Math.random() * 6) + 1;
        rollCount++;
        if (rollCount >= maxRolls) {
            clearInterval(rollInterval);
            dice.classList.remove('rolling');
            
            const result = parseInt(dice.textContent);
            showDiceResult(result);
            
            isRolling = false;
            rollBtn.disabled = false;
        }
    }, 100);
}

function showDiceResult(roll) {
    const resultDiv = document.getElementById('result');
    const rollBtn = document.getElementById('roll-btn');
    gameCount++;
    totalRevenue += 3;
    
    rollBtn.style.display = 'none';
    
    let prize = '';
    let prizeValue = 0;
    
    if (roll === 6) {
        prize = '🎉 一等奖！获得大窑汽水x2！';
        prizeValue = 3.5;
        resultDiv.className = 'result win';
    } else if (roll === 5 || roll === 4) {
        prize = '🎊 二等奖！获得大窑汽水x1！';
        prizeValue = 1.5;
        resultDiv.className = 'result win';
    } else {
        prize = '😊 参与奖！获得矿泉水x1！';
        prizeValue = 1.5;
        resultDiv.className = 'result normal';
    }
    
    totalPrizes += prizeValue;
    resultDiv.textContent = prize;
    updateStats();
}

function updateStats() {
    document.getElementById('game-count').textContent = gameCount;
    document.getElementById('total-revenue').textContent = '¥' + totalRevenue;
    document.getElementById('total-prizes').textContent = '¥' + totalPrizes.toFixed(1);
}
    </script>
</body>
</html>
